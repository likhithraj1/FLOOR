<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Evacuation System</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(135deg, #020617, #0f172a);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      max-width: 900px;
      padding: 40px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 16px;
      background: linear-gradient(90deg, #22c55e, #0ea5e9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      font-size: 18px;
      color: #cbd5f5;
      margin-bottom: 40px;
    }

    button {
      padding: 18px 42px;
      font-size: 20px;
      font-weight: bold;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      background: linear-gradient(90deg, #22c55e, #0ea5e9);
      color: black;
      box-shadow: 0 10px 30px rgba(34, 197, 94, 0.35);
      transition: all 0.25s ease;
    }

    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(14, 165, 233, 0.5);
    }

    button:active {
      transform: translateY(0);
      box-shadow: 0 8px 20px rgba(34, 197, 94, 0.4);
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Smart Evacuation Simulation</h1>
    <p>
      Visualize how people evacuate buildings in emergency situations  
      using interactive floor plans and real-time movement.
    </p>

    <button onclick="goToSim()">Generate JSON</button>
  </div>
    

  <script>
    function goToSim() {
      window.location.href = "generate-json.html";
    }
  </script>

 

</body>
</html>
